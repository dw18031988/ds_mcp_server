version: '1.0'
profile_id: <project-id>
project:
  name: <Project Name>
  timezone: Asia/Ho_Chi_Minh
  default_language: en
  description: <bounded project context>
repository:
  owner: <owner>
  name: <repo>
  url: https://github.com/<owner>/<repo>
  default_branch: main
  protected_branches:
  - main
  write_enabled: false
  identity_status: unconfirmed
  identity_note: Enable writes only after repository identity is verified.
connectors:
  git_provider: <connector>
  api_connector: null
  account_or_tenant: null
context:
  read_first:
  - README.md
  - AGENTS.md
  governance_from_protected_base: true
  session_root: /mnt/data/<project>_sessions/<YYYYMMDD-HHMM>-<TASK-ID>/
  additional_notes: []
commands:
  discovery_required: true
  package_manager: null
  validation_candidates:
  - discover from protected-base repository
  execution_note: Inspect every command before execution.
ci:
  provider: github-actions
  recheck_delay: PT2M
  required_workflows_discovery: true
  known_required_workflows: []
deployment:
  provider: null
  authority_gate: G5_DEPLOY
  project_name: null
production_data:
  provider: null
  authority_gate: G6_PRODUCTION_DATA
  notes: Configure only when applicable.
extensions:
- Project_Extension.template.md
